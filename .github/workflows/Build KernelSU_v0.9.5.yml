name: "Build KernelSU_v0.9.5"

on:
  # schedule:
  #   - cron: '0 15 * * *'
  workflow_dispatch:

env:
  OUT_DIR: "${{ github.workspace }}/out"

permissions:
  contents: write

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          jq -s '[.[][]]' repos*.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: "⏰ Set builddate"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-22.04
    needs:
      - Set-repos
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      WORKSPACE: ${{ github.workspace }}

      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      withKernelSU: ${{ matrix.repos.withKernelSU }}
      withLxcDocker: ${{ matrix.repos.lxcDocker.use || false }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python2 python3 libarchive-tools

      - name: "⏰ Setup Anykernel3"
        env:
          params: "${{ toJSON(matrix.repos.AnyKernel3) }}"
        run: |
          ANYKERNEL_REPO=$(echo $params | jq -r ".repo")
          ANYKERNEL_BRANCH=$(echo $params | jq -r ".branch")
          git clone --recursive --depth=1 -j $(nproc) --branch $ANYKERNEL_BRANCH $ANYKERNEL_REPO AnyKernel3

          echo "🤔 Setup Anykernel3 => ($ANYKERNEL_REPO)"

      - name: "🌟 Clone kernel source => (${{ env.KERNEL_REPO }})"
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch $KERNEL_BRANCH $KERNEL_REPO $KERNEL_NAME

          echo "🤔 Clone kernel source => ($KERNEL_REPO)"

      - name: "💫 Get toolchains"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          echo "🤔 There is $toolchains_num defined toolchains."
          for ((i=0;i<toolchains_num;i++)); do
            toolchain_name=$(echo $toolchains | jq -r ".[$i].name")
            toolchain_repo=$(echo $toolchains | jq -r ".[$i].repo")
            toolchain_branch=$(echo $toolchains | jq -r ".[$i].branch")

            git clone --recursive --depth=1 -j $(nproc) --branch $toolchain_branch $toolchain_repo $toolchain_name
            echo "🤔 Clone $toolchain_name => ($toolchain_repo)"

            jq -r ".[$i].binPath[] | tostring" <<< "$toolchains" | while read -r bin_path; do
              echo "$WORKSPACE/$toolchain_name/$bin_path" >> $GITHUB_PATH
            done
          done

      - name: "😎 Set args"
        id: generate-args
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
          THREAD: $(nproc --all)
        run: |
          echo "🤔 PATH Variable: $PATH"

          ARCH=$(echo $params | jq -r ".ARCH")
          CC=$(echo $params | jq -r ".CC")

          args="-j${{ env.THREAD }}"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p ${{ env.OUT_DIR }} && args="$args O=${{ env.OUT_DIR }}"
          fi
          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          if [ -n "$CC" ]; then
            args="$args CC=${{ env.WORKSPACE }}/$CC"
          fi
          while read -r externalCommand; do
            args="$args $externalCommand"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=${{ env.WORKSPACE }}/\(.value)"' <<< "$params")


          echo "🤔 $args"
          echo "ARCH=$ARCH" >> $GITHUB_OUTPUT
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "🐋 Enable LXC-Docker config"
        if: ${{ env.withLxcDocker == 'true' }}
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        run: |
          DEFCONFIG_PATH="arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}"
          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "❌ Defconfig not found: $DEFCONFIG_PATH"
            exit 1
          fi

          LXC_SCRIPT="${{ env.WORKSPACE }}/scripts/enable-lxc-docker-config.sh"
          if [ ! -f "$LXC_SCRIPT" ]; then
            echo "❌ Missing script: $LXC_SCRIPT"
            exit 1
          fi
          chmod +x "$LXC_SCRIPT"
          "$LXC_SCRIPT" "$DEFCONFIG_PATH"

      - name: "🩹 Apply runc patch"
        if: ${{ env.withLxcDocker == 'true' }}
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          RUNC_PATCH_SCRIPT="${{ env.WORKSPACE }}/scripts/apply-runc-patch.sh"
          if [ ! -f "$RUNC_PATCH_SCRIPT" ]; then
            echo "❌ Missing script: $RUNC_PATCH_SCRIPT"
            exit 1
          fi
          chmod +x "$RUNC_PATCH_SCRIPT"

          if [ -f "kernel/cgroup.c" ]; then
            "$RUNC_PATCH_SCRIPT" "kernel/cgroup.c"
          fi
          if [ -f "kernel/cgroup/cgroup.c" ]; then
            "$RUNC_PATCH_SCRIPT" "kernel/cgroup/cgroup.c"
          fi

          validate_runc_patch() {
            local target="$1"
            if [ ! -f "$target" ]; then
              return 0
            fi
            if grep -qE "^static int cgroup_add_file\(" "$target"; then
              if grep -qE "kernfs_create_link\(cgrp->kn, name, kn\);" "$target"; then
                echo "✅ runc patch verified: $target"
              else
                echo "❌ runc patch missing in $target"
                return 1
              fi
            fi
          }

          validate_runc_patch "kernel/cgroup.c"
          validate_runc_patch "kernel/cgroup/cgroup.c"

      - name: "😋 Update KernelSU"
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          if [ -d "./KernelSU" ]; then
            rm -rf "./KernelSU"
          fi
          if [ -d "./drivers/kernelsu" ]; then
            rm -rf "./drivers/kernelsu"
          fi

          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/v0.9.5/kernel/setup.sh" | bash -s v0.9.5

          # Compatibility for old kernels missing linux/compiler_types.h.
          if [ ! -f include/linux/compiler_types.h ]; then
            printf '%s\n' \
              '#ifndef _LINUX_COMPILER_TYPES_H' \
              '#define _LINUX_COMPILER_TYPES_H' \
              '#include <linux/compiler.h>' \
              '#endif' \
              > include/linux/compiler_types.h
          fi

          # Compatibility for old kernels missing MODULE_IMPORT_NS.
          if ! grep -RqsE "^[[:space:]]*#define[[:space:]]+MODULE_IMPORT_NS\\(" include/linux include 2>/dev/null; then
            if ! grep -qsE "^[[:space:]]*#define[[:space:]]+MODULE_IMPORT_NS\\(" drivers/kernelsu/ksu.c; then
              tmp_file="$(mktemp)"
              {
                echo "#ifndef MODULE_IMPORT_NS"
                echo "#define MODULE_IMPORT_NS(ns)"
                echo "#endif"
                cat drivers/kernelsu/ksu.c
              } > "$tmp_file"
              mv "$tmp_file" drivers/kernelsu/ksu.c
            fi
          fi

          DEFCONFIG_PATH="arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}"
          if [ -s "$DEFCONFIG_PATH" ] && [ "$(tail -c1 "$DEFCONFIG_PATH" | wc -l)" -eq 0 ]; then
            echo >> "$DEFCONFIG_PATH"
          fi

          set_cfg() {
            local key="$1"
            local value="$2"

            sed -i -E "/^${key}=|^# ${key} is not set$/d" "$DEFCONFIG_PATH"
            if [ "$value" = "n" ]; then
              echo "# ${key} is not set" >> "$DEFCONFIG_PATH"
            else
              echo "${key}=${value}" >> "$DEFCONFIG_PATH"
            fi
          }

          set_cfg "CONFIG_KPROBES" "y"
          set_cfg "CONFIG_HAVE_KPROBES" "y"
          set_cfg "CONFIG_KPROBE_EVENTS" "y"

          cat "$DEFCONFIG_PATH"

      - name: "👍 Make defconfig"
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
          arch: ${{ steps.generate-args.outputs.ARCH }}
        run: |
          echo "PATH Variable: $PATH"
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "🔎 Validate LXC-Docker config"
        if: ${{ env.withLxcDocker == 'true' }}
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          CONFIG_PATH="${{ env.OUT_DIR }}/.config"
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "❌ Missing generated config: $CONFIG_PATH"
            exit 1
          fi

          require_cfg_y() {
            local key="$1"
            if grep -qE "^${key}=y$" "$CONFIG_PATH"; then
              echo "✅ ${key}=y"
            else
              echo "❌ Missing ${key}=y"
              exit 1
            fi
          }

          require_cfg_n() {
            local key="$1"
            if grep -qE "^# ${key} is not set$" "$CONFIG_PATH"; then
              echo "✅ ${key}=n"
            else
              echo "❌ Expected ${key}=n"
              exit 1
            fi
          }

          for key in \
            CONFIG_NAMESPACES CONFIG_NET_NS CONFIG_PID_NS CONFIG_IPC_NS CONFIG_UTS_NS \
            CONFIG_CGROUPS CONFIG_CGROUP_CPUACCT CONFIG_CGROUP_DEVICE CONFIG_CGROUP_FREEZER CONFIG_CGROUP_SCHED CONFIG_CPUSETS CONFIG_MEMCG \
            CONFIG_KEYS CONFIG_POSIX_MQUEUE \
            CONFIG_VETH CONFIG_BRIDGE CONFIG_BRIDGE_NETFILTER \
            CONFIG_IP_NF_FILTER CONFIG_IP_NF_MANGLE CONFIG_IP_NF_RAW CONFIG_IP_NF_NAT CONFIG_IP_NF_TARGET_MASQUERADE \
            CONFIG_IP6_NF_FILTER CONFIG_IP6_NF_MANGLE CONFIG_IP6_NF_RAW CONFIG_IP6_NF_NAT CONFIG_IP6_NF_TARGET_MASQUERADE \
            CONFIG_NF_NAT CONFIG_NETFILTER_XT_MATCH_ADDRTYPE CONFIG_NETFILTER_XT_MATCH_CONNTRACK CONFIG_NETFILTER_XT_MATCH_IPVS CONFIG_NETFILTER_XT_MARK \
            CONFIG_OVERLAY_FS CONFIG_EXT4_FS CONFIG_EXT4_FS_POSIX_ACL CONFIG_EXT4_FS_SECURITY \
            CONFIG_SECCOMP CONFIG_SECCOMP_FILTER CONFIG_CGROUP_BPF CONFIG_MULTIUSER; do
            require_cfg_y "$key"
          done

          if grep -RqsE "^[[:space:]]*config[[:space:]]+NF_NAT_NEEDED([[:space:]]|$)" --include='Kconfig*' .; then
            require_cfg_y "CONFIG_NF_NAT_NEEDED"
          else
            echo "ℹ️ Skip CONFIG_NF_NAT_NEEDED check: symbol not present in this kernel"
          fi

          require_cfg_n "CONFIG_ANDROID_PARANOID_NETWORK"

      - name: "🎶 Build kernel"
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          make ${args}

      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        with:
          name: Image-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        with:
          name: Image.gz-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        with:
          name: dtb-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        with:
          name: dtbo.img-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Pack AnyKernel3.zip"
        if: ${{ env.useAnykernel == 'true' }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
          anykernel: "${{ env.WORKSPACE }}/${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}_${{ env.builddate }}"
        run: |
          ls -al

          if [ -e "${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz-dtb" ]; then
            cp -f ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz-dtb ./AnyKernel3/
          fi

          cd AnyKernel3/
          zip -q -r "${{ env.anykernel }}.zip" *

      - name: "💾 Upload AnyKernel3 image => (${{ env.builddate }})"
        uses: actions/upload-artifact@v4
        if: ${{ env.useAnykernel == 'true' }}
        with:
          name: "${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}_${{ env.builddate }}"
          path: AnyKernel3/*

      - name: 🧧 Create GitHub Release => (${{ env.builddate }})
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        if: ${{ env.useAnykernel == 'true' && env.release == 'true' }}
        with:
          tag_name: KernelSU_v0.9.5-for-MIUI&NGK_Kernel_v${{ env.builddate }}.${{ github.run_number }}
          files: "${{ env.WORKSPACE }}/${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}_${{ env.builddate }}.zip"
          generate_release_notes: true
